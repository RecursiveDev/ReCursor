<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <style>
    .ring-muted {
      stroke: #C5C7C9;
    }

    .ring-mid {
      stroke: #8A8D8F;
    }

    .ring-strong {
      stroke: #1A1A1C;
    }

    .arrow {
      fill: #1A1A1C;
    }

    @media (prefers-color-scheme: dark) {
      .ring-muted {
        stroke: #4F5254;
      }

      .ring-mid {
        stroke: #898C8E;
      }

      .ring-strong {
        stroke: #F0F1EA;
      }

      .arrow {
        fill: #F0F1EA;
      }
    }
  </style>

  <g fill="none" stroke-linecap="round">
    <path class="ring-muted" d="M 391 82 A 220 220 0 1 0 391 418" stroke-width="2.5" stroke-dasharray="14 18" />
    <path class="ring-muted" d="M 372 104 A 190 190 0 1 0 372 396" stroke-width="2.5" stroke-dasharray="10 14" />
    <path class="ring-mid" d="M 356 124 A 165 165 0 1 0 356 376" stroke-width="2" />
    <path class="ring-strong" d="M 343 139 A 145 145 0 1 0 343 361" stroke-width="5" />
    <path class="ring-strong" d="M 333 150 A 130 130 0 1 0 333 350" stroke-width="3" stroke-dasharray="8 10" />
    <path class="ring-strong" d="M 324 162 A 115 115 0 1 0 324 338" stroke-width="4.5" />
    <path class="ring-strong" d="M 314 173 A 100 100 0 1 0 314 327" stroke-width="2" />
  </g>

  <g transform="translate(0, -15) rotate(-15 280 250)">
    <polygon class="arrow" points="220,190 350,250 220,310 260,250" />
  </g>
</svg>
